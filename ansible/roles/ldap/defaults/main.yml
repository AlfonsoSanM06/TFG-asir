---
# =============================================================================
# roles/ldap/defaults/main.yml
# Valores por defecto. Las variables sensibles (passwords) van en vault.yml.
# =============================================================================

# --- Paquetes ---
ldap_packages:
  - slapd
  - ldap-utils
  - python3-ldap    # Necesario para los módulos community.general.ldap_*

# --- Organización ---
ldap_organization: "ARQ3D"
ldap_domain: "arq3d.local"
# Base DN derivada del dominio: dc=arq3d,dc=local
ldap_base_dn: "{{ ldap_domain.split('.') | map('regex_replace', '^', 'dc=') | join(',') }}"

# --- Servidor ---
ldap_server_uri: "ldap://localhost"
ldap_tls_enabled: false          # Activar en producción real con cert válido
ldap_log_level: 256              # 256 = conexiones; 0 = desactivado

# --- Unidades organizativas base ---
ldap_organizational_units:
  - usuarios
  - grupos
  - servicios

# --- Grupo base para usuarios K8s / Nextcloud ---
ldap_groups:
  - name: admins
    description: "Administradores de ARQ3D"
  - name: arquitectos
    description: "Equipo técnico — acceso Nextcloud y web"
  - name: k8s-readonly
    description: "Acceso de solo lectura al clúster"

# --- Usuario de servicio para bind (usado por Nextcloud y K8s) ---
ldap_bind_user_cn: "svc-bind"
ldap_bind_user_ou: "servicios"
# ldap_bind_password → definido en group_vars/all/vault.yml (ansible-vault)
# ldap_admin_password → definido en group_vars/all/vault.yml (ansible-vault)

# --- Schema extra ---
ldap_extra_schemas:
  - cosine
  - nis
  - inetorgperson

# --- Política de contraseñas ---
ldap_ppolicy_enabled: true
ldap_ppolicy_min_length: 12
ldap_ppolicy_max_failure: 5
ldap_ppolicy_lockout_duration: 1800   # 30 minutos en segundos
