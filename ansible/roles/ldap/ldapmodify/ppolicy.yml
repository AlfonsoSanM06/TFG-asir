---
# =============================================================================
# tasks/ppolicy.yml — Política de contraseñas (módulo ppolicy de OpenLDAP)
# =============================================================================

- name: "LDAP PPOLICY | Cargar módulo ppolicy en slapd"
  ansible.builtin.command: >
    ldapadd -Y EXTERNAL -H ldapi:/// -f /tmp/ppolicy_module.ldif
  args:
    creates: /etc/ldap/slapd.d/cn=config/cn=module{0}.ldif
  failed_when: false

- name: "LDAP PPOLICY | Desplegar LDIF de política"
  ansible.builtin.template:
    src: ppolicy.ldif.j2
    dest: /tmp/ppolicy.ldif
    mode: "0600"

- name: "LDAP PPOLICY | Aplicar política de contraseñas"
  community.general.ldap_entry:
    dn: "cn=default,ou=servicios,{{ ldap_base_dn }}"
    objectClass:
      - pwdPolicy
      - person
      - top
    attributes:
      cn: default
      sn: "PasswordPolicy"
      pwdAttribute: userPassword
      pwdMinLength: "{{ ldap_ppolicy_min_length }}"
      pwdMaxFailure: "{{ ldap_ppolicy_max_failure }}"
      pwdLockout: "TRUE"
      pwdLockoutDuration: "{{ ldap_ppolicy_lockout_duration }}"
      pwdMustChange: "FALSE"
      pwdAllowUserChange: "TRUE"
      pwdExpireWarning: "604800"    # 7 días de aviso antes de expirar
    server_uri: "{{ ldap_server_uri }}"
    bind_dn: "cn=admin,{{ ldap_base_dn }}"
    bind_pw: "{{ ldap_admin_password }}"
    state: present
  no_log: true

- name: "LDAP PPOLICY | Limpiar LDIFs temporales"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/ppolicy_module.ldif
    - /tmp/ppolicy.ldif
