---
# =============================================================================
# tasks/install.yml — Instala y preconfigura slapd vía debconf
# =============================================================================

- name: "LDAP INSTALL | Preconfigurar slapd con debconf (no-interactive)"
  ansible.builtin.debconf:
    name: slapd
    question: "{{ item.question }}"
    value: "{{ item.value }}"
    vtype: "{{ item.vtype }}"
  loop:
    - { question: "slapd/internal/generated_adminpw",  value: "{{ ldap_admin_password }}", vtype: password }
    - { question: "slapd/internal/adminpw",            value: "{{ ldap_admin_password }}", vtype: password }
    - { question: "slapd/password1",                   value: "{{ ldap_admin_password }}", vtype: password }
    - { question: "slapd/password2",                   value: "{{ ldap_admin_password }}", vtype: password }
    - { question: "slapd/domain",                      value: "{{ ldap_domain }}",         vtype: string }
    - { question: "shared/organization",               value: "{{ ldap_organization }}",   vtype: string }
    - { question: "slapd/backend",                     value: "MDB",                       vtype: select }
    - { question: "slapd/purge_database",              value: "false",                     vtype: boolean }
    - { question: "slapd/allow_ldap_v2",               value: "false",                     vtype: boolean }
    - { question: "slapd/no_configuration",            value: "false",                     vtype: boolean }
  no_log: true    # No exponer passwords en el output

- name: "LDAP INSTALL | Instalar paquetes OpenLDAP"
  ansible.builtin.apt:
    name: "{{ ldap_packages }}"
    state: present
    update_cache: true

- name: "LDAP INSTALL | Habilitar e iniciar slapd"
  ansible.builtin.systemd:
    name: slapd
    state: started
    enabled: true

- name: "LDAP INSTALL | Abrir puerto LDAP en UFW (VLAN 10 únicamente)"
  community.general.ufw:
    rule: allow
    port: "389"
    proto: tcp
    src: "192.168.10.0/24"
    comment: "LDAP — acceso exclusivo desde VLAN 10 (clúster K8s)"

- name: "LDAP INSTALL | Abrir puerto LDAPS en UFW (VLAN 10 únicamente)"
  community.general.ufw:
    rule: allow
    port: "636"
    proto: tcp
    src: "192.168.10.0/24"
    comment: "LDAPS — TLS"
