---
# =============================================================================
# tasks/install_master.yml — Instala K3s server (nodo master)
# =============================================================================

- name: "K3s MASTER | Crear directorio de configuración"
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "K3s MASTER | Desplegar config.yaml"
  ansible.builtin.template:
    src: k3s_server_config.yaml.j2
    dest: "{{ k3s_config_dir }}/config.yaml"
    owner: root
    group: root
    mode: "0600"
  notify: restart k3s server

- name: "K3s MASTER | Descargar e instalar K3s (versión pinada)"
  ansible.builtin.shell: |
    curl -sfL {{ k3s_install_script_url }} | \
    INSTALL_K3S_VERSION={{ k3s_version }} \
    INSTALL_K3S_EXEC="server {{ k3s_server_extra_args }}" \
    sh -
  args:
    creates: /usr/local/bin/k3s    # Idempotente: no re-instala si ya existe
  environment:
    K3S_KUBECONFIG_MODE: "{{ k3s_kubeconfig_mode }}"

- name: "K3s MASTER | Esperar a que el servidor esté listo (API en :6443)"
  ansible.builtin.wait_for:
    host: "{{ k3s_master_ip }}"
    port: 6443
    timeout: 120
    msg: "K3s API Server no responde en 2 minutos."

- name: "K3s MASTER | Habilitar e iniciar servicio k3s"
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true
    daemon_reload: true

- name: "K3s MASTER | Esperar a que el nodo master esté en Ready"
  ansible.builtin.command: >
    k3s kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[-1].type}'
  register: node_status
  until: node_status.stdout == "Ready"
  retries: 20
  delay: 10
  changed_when: false

- name: "K3s MASTER | Leer node-token para los workers"
  ansible.builtin.slurp:
    src: "{{ k3s_token_file }}"
  register: k3s_token_slurp

- name: "K3s MASTER | Exponer token como fact del host"
  ansible.builtin.set_fact:
    k3s_master_node_token: "{{ k3s_token_slurp.content | b64decode | trim }}"
