---
# =============================================================================
# group_vars/all/vault.yml
# ESTE FICHERO DEBE ESTAR CIFRADO CON ANSIBLE-VAULT.
#
# Para cifrarlo:   ansible-vault encrypt group_vars/all/vault.yml
# Para editarlo:   ansible-vault edit group_vars/all/vault.yml
# Para usarlo:     ansible-playbook ... --ask-vault-pass
#                              o con: --vault-password-file ~/.vault_pass
#
# NUNCA commitear este fichero sin cifrar.
# =============================================================================

# Token secreto de K3s (mínimo 32 caracteres aleatorios).
vault_k3s_token: "REEMPLAZA_CON_TOKEN_ALEATORIO_SEGURO"

# Contraseña del usuario arq3d (hash SHA-512 generado con: mkpasswd --method=SHA-512).
vault_arq3d_password_hash: "REEMPLAZA_CON_HASH_SHA512"

# Passwords de OpenLDAP — sustituir antes de cifrar
ldap_admin_password: "REEMPLAZA_PASSWORD_ADMIN_LDAP"
ldap_bind_password:  "REEMPLAZA_PASSWORD_BIND_SVC"
