[defaults]
inventory          = inventory.yml
roles_path         = roles
host_key_checking  = False
retry_files_enabled = False
stdout_callback    = yaml
callback_whitelist = timer, profile_tasks

# Paralelismo: ajusta según la RAM de tu máquina de control.
forks = 10

# Timeout de conexión SSH (útil si las VMs tardan en arrancar tras el apply).
timeout = 30

# Evita warnings de intérprete Python en hosts modernos.
interpreter_python = auto_silent

[ssh_connection]
pipelining     = True
control_path   = /tmp/ansible-ssh-%%h-%%p-%%r
ssh_args       = -o ControlMaster=auto -o ControlPersist=60s

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
become_ask_pass = False
